<div class="chart-container mat-typography">
  @if (chartTitle) {
    <h4 class="chart-title">{{ chartTitle }}</h4>
    <canvas
      baseChart
      [data]="pieChartData"
      [type]="pieChartType"
      [options]="pieChartOptions"
      [plugins]="pieChartPlugins"
      [legend]="pieChartLegend"
    >
    </canvas>
  }
</div>
